<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ShotFactory – Request sent</title>
  <link rel="stylesheet" href="/styles.css?v=thanks-minimal-01" />
  <style>
    .thanks-wrap{
      min-height: calc(100vh - var(--topbar-h) - var(--safe-top));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 0;
    }

    .thanks-card{
      width:min(680px, 92%);
      text-align:left;
    }

    .thanks-card h1{
      margin:0 0 22px;
      font-size:56px;
      line-height:1.02;
      letter-spacing:-1.4px;
      color:var(--text);
    }

    .thanks-actions{
      display:flex;
      gap:12px;
    }

    .thanks-actions .btn{
      min-width:120px;
    }

    @media (max-width:700px){
      .thanks-card h1{
        font-size:38px;
      }
    }
  </style>
</head>
<body>
  <main class="thanks-wrap">
    <div class="card thanks-card">
      <h1>Request sent</h1>

      <div class="thanks-actions">
        <a class="btn primary" href="/index.html">OK</a>
      </div>
    </div>
  </main>
</body>
</html>
